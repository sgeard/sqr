name: docs

# Build the FORD API reference and publish it to GitHub Pages on every push to
# main. No generated files are committed — the site is rebuilt from src/ +
# ford.md each time. Enable once in repo Settings → Pages → Source = "GitHub
# Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-flight builds.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install FORD
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz
          pip install ford

      - name: Build API docs
        run: ford ford.md   # output_dir = ford_docs (set in ford.md)

      - uses: actions/configure-pages@v5
        with:
          # Enable Pages via the API if it isn't already, and avoid the
          # "Get Pages site failed / Not Found" race on first run.
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ford_docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
